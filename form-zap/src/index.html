<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Form Zap</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="topo">
      <img src="../icons/whatsapp.png" alt="WhatsApp">
      <h2>Empresa</h2>
    </div>

    <div class="mensagem">
      <p>
        Olá! Insira seus dados para ser direcionado para o WhatsApp.
      </p>
    </div>

    <form>

      <label>Seu nome</label>
      <input type="text" id="nome" placeholder="Digite seu nome">

      <label>Seu e-mail</label>
      <input type="email" id="email" placeholder="exemplo@email.com">

      <label>Seu WhatsApp</label>
      <input type="text" id="telefone" placeholder="+55 (11) 99999-9999">

      <button type="button" onclick="enviarWhatsapp()">
        Ir para o WhatsApp
      </button>

    </form>

    <p class="rodape">Powered by Agendor</p>

  </div>

  <script src="script.js"></script>
</body>
</html>
